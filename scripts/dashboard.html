<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModelFlow Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <style>
    html, body, #root {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #070502;
      overflow: hidden;
    }
    #boot {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #070502;
      color: #d4a96a;
      font-family: 'VT323', monospace;
      font-size: 22px;
      letter-spacing: 1px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="boot">Loading ModelFlow dashboard...</div>
  <div id="root"></div>

  <script>
    (async function () {
      const resp = await fetch("/scripts/index.jsx");
      if (!resp.ok) throw new Error("Failed to load /scripts/index.jsx: " + resp.status);
      const src = await resp.text();
      eval(src);
      const boot = document.getElementById("boot");
      if (boot) boot.style.display = "none";
    })().catch(err => {
      const boot = document.getElementById("boot");
      if (boot) boot.textContent = "Dashboard load failed: " + err.message;
      console.error(err);
    });
  </script>
</body>
</html>
